name: tb_custom_clean_mobile
description: T&B Custom Clean native mobile app for product entry and QR exit operations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  mobile_scanner: ^5.2.3
  geolocator: ^13.0.1
  image_picker: ^1.1.2
  connectivity_plus: ^6.0.5
  sqflite: ^2.3.3+1
  path: ^1.9.0
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/tb_logo.jpg
    - assets/images/tb_brand_1.jpg
    - assets/images/tb_brand_2.jpg
